name: SELF_EVOLVE_CYCLE
on:
  schedule:
    - cron: "0 */6 * * *" # Runs 4x per day
  workflow_dispatch:

jobs:
  evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Deps
        run: pip install -r requirements.txt
      - name: Run Repair Core
        run: python mycelium/REPAIR_CORE.py
      - name: Run Evolution Agent
        run: python mycelium/EVOLUTION_AGENT.py
      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Meeko-Evolution-Bot"
          git add .
          git commit -m "EVO: Autonomous system update $(date)" || echo "No changes"
          git push
