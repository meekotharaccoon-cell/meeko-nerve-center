name: "🔨 BUILD — SolarPunk Self-Assembly"

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'What to focus on this build (optional)'
        required: false
        default: ''

permissions:
  contents: write

env:
  HF_TOKEN:           ${{ secrets.HF_TOKEN }}
  GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Configure git
        run: |
          git config user.name 'SolarPunk-Build'
          git config user.email 'build@solarpunk'
          mkdir -p data mycelium

      - name: Self-Build via AI_CLIENT
        run: |
          python3 - <<'PYEOF'
          import os, json, sys, smtplib
          from pathlib import Path
          from datetime import datetime
          from email.mime.text import MIMEText

          sys.path.insert(0, 'mycelium')
          try:
              from AI_CLIENT import ask
              AI_OK = True
          except Exception as e:
              print(f"AI_CLIENT error: {e}")
              AI_OK = False

          note    = os.environ.get("BUILD_NOTE", os.environ.get("INPUT_NOTE", ""))
          my_dir  = Path("mycelium")
          engines = [f.name for f in my_dir.glob("*.py")]

          tier_f = Path("data/tier_state.json")
          tier_state = json.loads(tier_f.read_text()) if tier_f.exists() else {}
          current_tier = tier_state.get("current_tier", 0)
          next_tier = current_tier + 1

          print(f"BUILD tier {current_tier} → {next_tier} | {len(engines)} engines | AI={'on' if AI_OK else 'off'}")

          self_built = []
          if AI_OK:
              prompt = f"""SolarPunk needs a new Python engine. Existing: {engines[:30]}

Write ONE new engine for mycelium/ that:
- Does NOT duplicate anything in the list above
- Generates or amplifies revenue (affiliate, social, SEO, email, etc.)
- Runs on GitHub Actions, no human input needed
- Uses only: requests, smtplib, json, os, pathlib, datetime, re (stdlib)
- Has load(), save(state), run(), if __name__=="__main__": run()
- Saves state to data/ENGINENAME_state.json
- Under 180 lines, handles all exceptions

Respond ONLY with:
FILENAME: ENGINE_NAME.py
---
<complete python code>
---"""
              try:
                  text = ask([{"role": "user", "content": prompt}], max_tokens=3000)
                  fname = ""; code_lines = []; in_code = False; dashes = 0
                  for line in text.split("\n"):
                      if line.startswith("FILENAME:"):
                          fname = line.split("FILENAME:")[1].strip()
                      elif line.strip() == "---":
                          dashes += 1
                          if dashes == 1: in_code = True
                          elif dashes == 2: in_code = False
                      elif in_code:
                          code_lines.append(line)
                  if fname and code_lines:
                      code = "\n".join(code_lines)
                      # Validate — no unsafe patterns
                      for bad in ["os.system(", "subprocess.call(", "eval(", "exec("]:
                          if bad in code:
                              print(f"Safety check failed: {bad}")
                              fname = ""
                              break
                      if fname and ".github" not in code:
                          target = my_dir / fname
                          if target.exists():
                              fname = fname.replace(".py", f"_v{next_tier}.py")
                              target = my_dir / fname
                          target.write_text(code)
                          self_built.append(fname)
                          print(f"✅ Built: {fname} ({len(code_lines)} lines)")
              except Exception as e:
                  print(f"Build error: {e}")

          # Save state
          tier_f.write_text(json.dumps({
              "current_tier": next_tier,
              "last_build": datetime.now().isoformat(),
              "engines_count": len(engines) + len(self_built),
              "note": note,
              "self_built": self_built,
          }, indent=2))

          lf = Path("data/build_log.json")
          log = json.loads(lf.read_text()) if lf.exists() else []
          log.append({"tier": next_tier, "ts": datetime.now().isoformat(),
                      "engines": len(engines), "built": self_built, "note": note})
          lf.write_text(json.dumps(log[-100:], indent=2))

          # Email
          gmail = os.environ.get("GMAIL_ADDRESS", "")
          gpass = os.environ.get("GMAIL_APP_PASSWORD", "")
          if gmail and gpass and self_built:
              try:
                  body = f"BUILD tier {next_tier} complete.\n\nBuilt: {self_built}\nNote: {note or '(none)'}\n— SolarPunk"
                  msg = MIMEText(body)
                  msg["Subject"] = f"[SolarPunk] BUILD tier {next_tier} — {self_built}"
                  msg["From"] = gmail; msg["To"] = gmail
                  with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                      s.login(gmail, gpass); s.send_message(msg)
              except: pass

          print(f"BUILD COMPLETE — tier {next_tier}")
          PYEOF
        env:
          INPUT_NOTE: ${{ github.event.inputs.note }}

      - name: Commit build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add data/ mycelium/
          git diff --staged --quiet && echo "Nothing new" && exit 0
          TIER=$(python3 -c "import json; print(json.loads(open('data/tier_state.json').read()).get('current_tier',0))" 2>/dev/null || echo "?")
          git commit -m "[build] tier $TIER $(date +%Y-%m-%dT%H:%M)"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
        continue-on-error: true
