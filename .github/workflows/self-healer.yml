name: 🩹 Self Healer

# Runs daily + manually ONLY.
# Removed workflow_run trigger — was causing cascade email floods.
# When OTHER workflows fail, that's expected. Self-healer runs on schedule.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  heal:
    runs-on: ubuntu-latest
    continue-on-error: true   # ← never sends failure email
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Run self healer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python mycelium/self_healer.py
        continue-on-error: true

      - name: Commit healer outputs
        run: |
          git config user.name  "meeko-healer"
          git config user.email "healer@meeko-nerve-center"
          git add data/errors.json data/heal_log.md data/heal_report.json \
                  FIXES_NEEDED.md requirements.txt 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" || (
            git commit -m "🩹 self-healer run [$(date -u +%Y-%m-%dT%H:%M)]" && git push
          )
        continue-on-error: true

      - name: Print open issues
        run: cat FIXES_NEEDED.md 2>/dev/null || echo "Clean"
        continue-on-error: true
