name: Dual Brain Sync

on:
  schedule:
    # 1 hour after Claude (10am + 10pm UTC)
    # By then both Claude AND Kimi have run and written their reports
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual sync trigger'
        required: false
        default: 'manual sync'

jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: true   # silent failure — no email
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Dual Brain Sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python mycelium/dual_brain_sync.py

      - name: Upload shared brain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-brain-${{ github.run_id }}
          path: |
            data/shared_brain_state.json
            data/dual_brain_conversation.json
            data/system_wants_next.json
          if-no-files-found: ignore
