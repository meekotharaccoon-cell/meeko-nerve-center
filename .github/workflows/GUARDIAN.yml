name: "🛡️ GUARDIAN — Instant Disaster Detection + Auto-Restore"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'  # Backup check every 4 hours
  workflow_dispatch:

# GUARDIAN runs on EVERY push.
# If SYNTHESIS_FACTORY, EVOLVE, or any merge wipes .github/workflows,
# the very next commit triggers GUARDIAN which restores everything from git history.
# Alert email sent to Meeko immediately.

jobs:
  guardian:
    name: "🛡️ Guardian"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'GUARDIAN'
          git config user.email 'guardian@meeko-nerve-center'
          mkdir -p data data/snapshots

      - name: "🛡️ Check + Auto-Restore Critical Files"
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          RESTORED=0
          MISSING_LIST=""

          # These files must ALWAYS exist. If missing, restore from git history.
          CRITICAL=(
            ".github/workflows/OMNIBRAIN.yml"
            ".github/workflows/SOLARPUNK_LOOP.yml"
            ".github/workflows/GUARDIAN.yml"
            ".github/workflows/BUILD_YOURSELF.yml"
          )

          for FILE in "${CRITICAL[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "🚨 MISSING: $FILE"
              MISSING_LIST="$MISSING_LIST $FILE"
              LAST=$(git log --all --full-history --format="%H" -- "$FILE" | head -1)
              if [ -n "$LAST" ]; then
                git checkout "$LAST" -- "$FILE"
                echo "✅ Restored $FILE from $LAST"
                RESTORED=$((RESTORED + 1))
              else
                echo "❌ No git history for $FILE"
              fi
            fi
          done

          if [ $RESTORED -gt 0 ]; then
            git add -A
            git commit -m "🛡️ GUARDIAN restored $RESTORED critical files [$(date +%Y-%m-%dT%H:%M)]"
            git pull --rebase origin main || true
            git push origin main || true

            # Alert Meeko
            python3 - <<PYEOF
import os, smtplib
from email.mime.text import MIMEText
from datetime import datetime

gmail = os.environ.get("GMAIL_ADDRESS", "")
gpass = os.environ.get("GMAIL_APP_PASSWORD", "")
if not gmail or not gpass:
    print("No email creds — alert skipped")
    exit(0)

body = f"""🚨 GUARDIAN ALERT — SolarPunk Disaster Auto-Fixed

Time: {datetime.now().isoformat()}

WHAT HAPPENED:
Critical workflow files were deleted from the repo.
Likely cause: SYNTHESIS_FACTORY or EVOLVE ran a dangerous git merge.

FILES RESTORED: {os.environ.get("RESTORED", "??")} files from git history

SYSTEM STATUS: Back online. Resuming autonomous operations.

PREVENTION: SYNTHESIS_FACTORY is now patched to never touch .github/

— GUARDIAN 🛡️"""

try:
    msg = MIMEText(body)
    msg["Subject"] = f"🚨 SolarPunk DISASTER FIXED [{datetime.now().strftime('%b %d %H:%M')}]"
    msg["From"] = gmail
    msg["To"] = gmail
    with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
        s.login(gmail, gpass)
        s.send_message(msg)
    print("🚨 Alert sent to Meeko")
except Exception as e:
    print(f"Email error: {e}")
PYEOF
          else
            echo "✅ All critical files present — system healthy"
          fi

      - name: "📸 Save State Snapshot"
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path
          from datetime import datetime

          myc = Path("mycelium")
          wf = Path(".github/workflows")
          dat = Path("data")

          engines   = sorted([f.name for f in myc.glob("*.py") if not f.name.startswith("__")]) if myc.exists() else []
          workflows = sorted([f.name for f in wf.glob("*.yml")]) if wf.exists() else []
          data_files = sorted([f.name for f in dat.glob("*.json")]) if dat.exists() else []

          # Determine engine health
          REQUIRED = [
              "NEURON_A.py","NEURON_B.py","SYNAPSE.py","SYNTHESIS_FACTORY.py",
              "REVENUE_FLYWHEEL.py","GETSCREEN_BRIDGE.py","email_gateway.py",
              "revenue_router.py","social_poster.py","knowledge_dispatch.py"
          ]
          missing_engines = [e for e in REQUIRED if e not in engines]

          snapshot = {
              "timestamp": datetime.now().isoformat(),
              "engine_count": len(engines),
              "engines": engines,
              "workflows": workflows,
              "data_files": data_files,
              "missing_required_engines": missing_engines,
              "health": "HEALTHY" if len(workflows) >= 4 and len(engines) >= 10 else
                        "DEGRADED" if len(workflows) >= 2 else "CRITICAL"
          }

          Path("data/snapshots").mkdir(parents=True, exist_ok=True)
          ts = datetime.now().strftime("%Y%m%d_%H%M")
          Path(f"data/snapshots/{ts}.json").write_text(json.dumps(snapshot, indent=2))

          # Keep last 20 snapshots
          snaps = sorted(Path("data/snapshots").glob("*.json"))
          for old in snaps[:-20]:
              old.unlink()

          Path("data/guardian_state.json").write_text(json.dumps(snapshot, indent=2))
          print(f"📸 {snapshot['health']} | {len(engines)} engines | {len(workflows)} workflows")
          if missing_engines:
              print(f"   Missing: {missing_engines[:5]}")
          PYEOF

      - name: Commit snapshot
        run: |
          git add data/ 2>/dev/null || true
          git diff --cached --quiet && echo "Clean" && exit 0
          git commit -m "📸 guardian snapshot [$(date +%Y-%m-%dT%H:%M)]"
          git pull --rebase origin main || true
          git push origin main || true
