name: ⚙️ Setup Wizard — Configure New Secrets
# Run this workflow to add new secrets without touching local machine.
# GitHub token is already available. Only provide what's missing.
on:
  workflow_dispatch:
    inputs:
      human_full_name:
        description: 'Your full name (for job applications)'
        required: false
      human_location:
        description: 'Your location (e.g. Brooklyn, New York)'
        required: false
        default: 'United States'
      etsy_api_key:
        description: 'Etsy API key'
        required: false
      etsy_shop_id:
        description: 'Etsy shop ID'
        required: false
      paypal_client_id:
        description: 'PayPal Client ID'
        required: false
      phantom_wallet:
        description: 'Phantom wallet PUBLIC address'
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    continue-on-error: true   # silent failure — no email
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upload provided secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUMAN_FULL_NAME: ${{ github.event.inputs.human_full_name }}
          HUMAN_LOCATION: ${{ github.event.inputs.human_location }}
        run: |
          echo "Setup wizard running via GitHub Actions"
          echo "GitHub token: available automatically"
          echo "Provided: HUMAN_FULL_NAME=$HUMAN_FULL_NAME"
          pip install PyNaCl -q
          python setup_wizard.py --from-actions
        continue-on-error: true
