name: "Run SolarPunk NOW"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why'
        default: 'test'
        required: false

permissions:
  contents: write

env:
  PYTHONPATH: mycelium
  ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
  GMAIL_ADDRESS:           ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
  GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
  GUMROAD_ACCESS_TOKEN:    ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  HF_TOKEN:                ${{ secrets.HF_TOKEN }}
  KOFI_USERNAME:           ${{ secrets.KOFI_USERNAME }}
  KOFI_VERIFICATION_TOKEN: ${{ secrets.KOFI_VERIFICATION_TOKEN }}
  MEEKO_AFFILIATE_LINK:    autonomoushum-20

jobs:
  run-now:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # NO cache: pip — we don't have requirements.txt

      - name: Install deps
        run: pip install requests python-dateutil imapclient tweepy praw beautifulsoup4 feedparser

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: brain-${{ github.run_number }}
          restore-keys: brain-

      - run: mkdir -p docs

      - name: Check AI
        run: |
          python -c "
          import sys, os; sys.path.insert(0, 'mycelium')
          for s in ['HF_TOKEN','GMAIL_ADDRESS','GITHUB_TOKEN']:
              v = os.environ.get(s,'')
              print(f'{s}: {\"OK \" + str(len(v)) + \"c\" if v else \"MISSING\"}')
          try:
              from AI_CLIENT import ask; print('AI_CLIENT: OK')
          except Exception as e: print(f'AI_CLIENT: {e}')
          " || true

      - name: Run OMNIBUS
        run: python mycelium/OMNIBUS.py
        continue-on-error: true

      - name: Commit + push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "SolarPunk Brain"
          git config user.email "meekotharaccoon@gmail.com"
          git add data/ docs/ mycelium/ 2>/dev/null || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "brain $(date -u +'%Y-%m-%d %H:%M') [${{ github.event.inputs.reason }}]"
          git pull --rebase "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main || true
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
