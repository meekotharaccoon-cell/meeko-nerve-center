name: "🧠 OMNIBRAIN v3 — SolarPunk Full Stack"

on:
  schedule:
    - cron: '0 7  * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Manual instruction for this run'
        required: false
        default: ''

jobs:
  omnibrain:
    name: "🧠 OMNIBRAIN v3"
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name 'SolarPunk'
          git config user.email 'solarpunk@meeko-nerve-center'
          mkdir -p data mycelium docs saves

      - name: "🛡️ Phase 0 — GUARDIAN"
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/GUARDIAN.py || echo "GUARDIAN error"
        continue-on-error: true

      - name: "🌿 Phase 1 — CONTENT_HARVESTER (free APIs, zero cost)"
        run: python3 mycelium/CONTENT_HARVESTER.py || echo "CONTENT_HARVESTER error"
        continue-on-error: true

      - name: "🏛️ Phase 2 — MEMORY_PALACE (persist + learn)"
        run: python3 mycelium/MEMORY_PALACE.py || echo "MEMORY_PALACE error"
        continue-on-error: true

      - name: "🧠 Phase 3 — NEURON_A Builder Brain"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/NEURON_A.py || echo "NEURON_A error"
        continue-on-error: true

      - name: "🧠 Phase 4 — NEURON_B Skeptic Brain"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/NEURON_B.py || echo "NEURON_B error"
        continue-on-error: true

      - name: "🏪 Phase 5 — ETSY_SEO_ENGINE (Gaza Rose listings)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/ETSY_SEO_ENGINE.py || echo "ETSY_SEO_ENGINE error"
        continue-on-error: true

      - name: "💰 Phase 6 — INCOME_ARCHITECT ($1 Art Loop)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/INCOME_ARCHITECT.py || echo "INCOME_ARCHITECT error"
        continue-on-error: true

      - name: "🎨 Phase 7 — ART_GENERATOR (fulfill orders)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 mycelium/ART_GENERATOR.py || echo "ART_GENERATOR error"
        continue-on-error: true

      - name: "💸 Phase 8 — REVENUE_FLYWHEEL (upgrade alerts)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/REVENUE_FLYWHEEL.py || echo "REVENUE_FLYWHEEL error"
        continue-on-error: true

      - name: "🏭 Phase 9 — SYNTHESIS_FACTORY (safe auto-builder)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/SYNTHESIS_FACTORY.py || echo "SYNTHESIS_FACTORY error"
        continue-on-error: true

      - name: "🌐 Phase 10 — BRAVE_BRIDGE (browser)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/BRAVE_BRIDGE.py || echo "BRAVE_BRIDGE not present"
        continue-on-error: true

      - name: "🖥️ Phase 11 — GETSCREEN_BRIDGE (desktop)"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/GETSCREEN_BRIDGE.py || echo "GETSCREEN_BRIDGE not present"
        continue-on-error: true

      - name: "⚡ Phase 12 — SYNAPSE (resolver + daily email)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/SYNAPSE.py || echo "SYNAPSE error"
        continue-on-error: true

      - name: "💾 Final — Commit cycle outputs"
        run: |
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          CYCLE=$(date +%Y-%m-%dT%H:%M)
          HEALTH=$(python3 -c "import json; d=json.load(open('data/brain_state.json')); print(d.get('health_score','?'))" 2>/dev/null || echo "?")
          git commit -m "🧠 omnibrain v3 ${CYCLE} | health:${HEALTH}"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main 2>/dev/null || git push origin main --force-with-lease
        continue-on-error: true
