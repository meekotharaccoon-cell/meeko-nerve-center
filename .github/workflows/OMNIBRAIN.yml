name: SolarPunk OMNIBRAIN v5 — Autonomous Operations

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC
    - cron: '0 12 * * *'  # Noon UTC
    - cron: '0 18 * * *'  # 6pm UTC
    - cron: '0 21 * * *'  # 9pm UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        default: 'Manual test'

permissions:
  contents: write
  actions: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  KOFI_USERNAME: ${{ secrets.KOFI_USERNAME }}
  KOFI_VERIFICATION_TOKEN: ${{ secrets.KOFI_VERIFICATION_TOKEN }}
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
  REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
  REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
  REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
  REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
  MEEKO_AFFILIATE_LINK: autonomoushum-20

jobs:
  solarpunk-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout — pull latest engines
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil pillow imapclient --quiet

      - name: Restore brain state
        uses: actions/cache@v4
        with:
          path: data/
          key: solarpunk-brain-${{ github.run_number }}
          restore-keys: solarpunk-brain-

      # ═══════════════════════════════════════════════
      # PHASE 1: HEALTH CHECK
      # ═══════════════════════════════════════════════
      - name: Phase 1 — Guardian health check
        run: python mycelium/GUARDIAN.py || echo "Guardian fallback"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 2: EMAIL CORTEX
      # ═══════════════════════════════════════════════
      - name: Phase 2a — Read all email (EMAIL_BRAIN)
        run: python mycelium/EMAIL_BRAIN.py || echo "Email brain offline"
        continue-on-error: true

      - name: Phase 2b — Scam detection (SCAM_SHIELD)
        run: python mycelium/SCAM_SHIELD.py || echo "Scam shield fallback"
        continue-on-error: true

      - name: Phase 2c — Human detection + reply (HUMAN_CONNECTOR)
        run: python mycelium/HUMAN_CONNECTOR.py || echo "Human connector fallback"
        continue-on-error: true

      - name: Phase 2d — Calendar scheduling (CALENDAR_BRAIN)
        run: python mycelium/CALENDAR_BRAIN.py || echo "Calendar offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 3: MONEY IN
      # ═══════════════════════════════════════════════
      - name: Phase 3a — Ko-fi sales processor (KOFI_ENGINE)
        run: python mycelium/KOFI_ENGINE.py || echo "Kofi offline"
        continue-on-error: true

      - name: Phase 3b — Gumroad sales (GUMROAD_ENGINE)
        run: python mycelium/GUMROAD_ENGINE.py || echo "Gumroad offline"
        continue-on-error: true

      - name: Phase 3c — GitHub Sponsors (GITHUB_SPONSORS_ENGINE)
        run: python mycelium/GITHUB_SPONSORS_ENGINE.py || echo "Sponsors offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 4: GRANTS
      # ═══════════════════════════════════════════════
      - name: Phase 4a — Hunt new grants (GRANT_HUNTER)
        run: python mycelium/GRANT_HUNTER.py || echo "Grant hunter offline"
        continue-on-error: true

      - name: Phase 4b — Apply + follow up (GRANT_APPLICANT)
        run: python mycelium/GRANT_APPLICANT.py || echo "Grant applicant offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 5: MARKET INTELLIGENCE
      # ═══════════════════════════════════════════════
      - name: Phase 5a — Crypto + AI token watch (CRYPTO_WATCHER)
        run: python mycelium/CRYPTO_WATCHER.py || echo "Crypto watcher offline"
        continue-on-error: true

      - name: Phase 5b — AI ecosystem scout (AI_WATCHER)
        run: python mycelium/AI_WATCHER.py || echo "AI watcher offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 6: BUSINESS FACTORY
      # ═══════════════════════════════════════════════
      - name: Phase 6a — Build new business (BUSINESS_FACTORY)
        run: python mycelium/BUSINESS_FACTORY.py || echo "Business factory offline"
        continue-on-error: true

      - name: Phase 6b — Maximize affiliate revenue (AFFILIATE_MAXIMIZER)
        run: python mycelium/AFFILIATE_MAXIMIZER.py || echo "Affiliate maximizer offline"
        continue-on-error: true

      - name: Phase 6c — Deploy landing pages live (LANDING_DEPLOYER)
        run: python mycelium/LANDING_DEPLOYER.py || echo "Landing deployer offline"
        continue-on-error: true

      - name: Phase 6d — Platform connections (CONNECTION_FORGE)
        run: python mycelium/CONNECTION_FORGE.py || echo "Connection forge offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 7: CONTENT + ART
      # ═══════════════════════════════════════════════
      - name: Phase 7a — Generate Gaza Rose art (ART_GENERATOR)
        run: python mycelium/ART_GENERATOR.py || echo "Art gen offline"
        continue-on-error: true

      - name: Phase 7b — Social media posts (SOCIAL_PROMOTER)
        run: python mycelium/SOCIAL_PROMOTER.py || echo "Social offline"
        continue-on-error: true

      - name: Phase 7c — Weekly newsletter draft (SUBSTACK_ENGINE)
        run: python mycelium/SUBSTACK_ENGINE.py || echo "Substack offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 8: SELF-IMPROVEMENT
      # ═══════════════════════════════════════════════
      - name: Phase 8a — Build new engine (SELF_BUILDER)
        run: python mycelium/SELF_BUILDER.py || echo "Self builder offline"
        continue-on-error: true

      - name: Phase 8b — Synthesis factory (SYNTHESIS_FACTORY)
        run: python mycelium/SYNTHESIS_FACTORY.py || echo "Synthesis offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 9: BRIEFING
      # ═══════════════════════════════════════════════
      - name: Phase 9a — Morning + Evening emails (BRIEFING_ENGINE)
        run: python mycelium/BRIEFING_ENGINE.py || echo "Briefing offline"
        continue-on-error: true

      - name: Phase 9b — Rebuild README (README_GENERATOR)
        run: python mycelium/README_GENERATOR.py || echo "README offline"
        continue-on-error: true

      # ═══════════════════════════════════════════════
      # PHASE 10: SAVE STATE (ALWAYS RUNS)
      # ═══════════════════════════════════════════════
      - name: Phase 10 — Commit all state changes
        run: |
          git config user.name "SolarPunk Brain"
          git config user.email "meekotharaccoon@gmail.com"
          git add data/ docs/ mycelium/ .github/FUNDING.yml README.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🧠 Brain cycle $(date -u +%Y-%m-%d\ %H:%M) — autonomous operation"
          git push origin main || echo "Push failed — will retry next cycle"
        continue-on-error: true
