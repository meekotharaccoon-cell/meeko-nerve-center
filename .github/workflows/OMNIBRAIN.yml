name: "🧠 OMNIBRAIN v2 — SolarPunk Full Stack"

on:
  schedule:
    - cron: '0 7  * * *'   # 7am UTC
    - cron: '0 19 * * *'   # 7pm UTC
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Manual instruction for this run'
        required: false
        default: ''

# CHAIN OF COMMAND: Meeko -> Claude -> SolarPunk
# GUARDIAN runs FIRST every cycle. Save-state before anything.
# .github/workflows is SACRED — no engine touches it.

jobs:
  omnibrain:
    name: "🧠 OMNIBRAIN"
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name 'SolarPunk'
          git config user.email 'solarpunk@meeko-nerve-center'
          mkdir -p data mycelium

      # ─── PHASE 0: GUARDIAN — immune system, save-state ───────────────────
      - name: "🛡️ Phase 0 — GUARDIAN (runs first, always)"
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 mycelium/GUARDIAN.py || echo "GUARDIAN not present yet — bootstrapping"
        continue-on-error: true

      # ─── PHASE 1: NEURON_A — Builder Brain ───────────────────────────────
      - name: "🧠 Phase 1 — NEURON_A Builder Brain"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/NEURON_A.py || echo "NEURON_A error"
        continue-on-error: true

      # ─── PHASE 2: NEURON_B — Skeptic Brain ───────────────────────────────
      - name: "🧠 Phase 2 — NEURON_B Skeptic Brain"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/NEURON_B.py || echo "NEURON_B error"
        continue-on-error: true

      # ─── PHASE 3: INCOME_ARCHITECT — $1 Art Loop Engine ──────────────────
      - name: "💰 Phase 3 — INCOME_ARCHITECT ($1 Art Loop)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/INCOME_ARCHITECT.py || echo "INCOME_ARCHITECT error"
        continue-on-error: true

      # ─── PHASE 4: ART_GENERATOR — Fulfill pending art orders ─────────────
      - name: "🎨 Phase 4 — ART_GENERATOR (fulfill orders)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 mycelium/ART_GENERATOR.py || echo "ART_GENERATOR error"
        continue-on-error: true

      # ─── PHASE 5: REVENUE_FLYWHEEL — upgrade alerts ───────────────────────
      - name: "💸 Phase 5 — REVENUE_FLYWHEEL (upgrade alerts)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/REVENUE_FLYWHEEL.py || echo "REVENUE_FLYWHEEL error"
        continue-on-error: true

      # ─── PHASE 6: SYNTHESIS_FACTORY — build approved new engines ─────────
      - name: "🏭 Phase 6 — SYNTHESIS_FACTORY (safe auto-builder)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # SAFETY: SYNTHESIS_FACTORY must ONLY write to mycelium/SYNTH_* and data/
          # It must NEVER touch .github/ — enforced in the Python code itself
          python3 mycelium/SYNTHESIS_FACTORY.py || echo "SYNTHESIS_FACTORY error"
        continue-on-error: true

      # ─── PHASE 7: BRAVE_BRIDGE — browser automation ───────────────────────
      - name: "🌐 Phase 7 — BRAVE_BRIDGE (browser automation)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 mycelium/BRAVE_BRIDGE.py || echo "BRAVE_BRIDGE not present"
        continue-on-error: true

      # ─── PHASE 8: GETSCREEN_BRIDGE — desktop eyes/hands ──────────────────
      - name: "🖥️ Phase 8 — GETSCREEN_BRIDGE (desktop control)"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/GETSCREEN_BRIDGE.py || echo "GETSCREEN_BRIDGE not present"
        continue-on-error: true

      # ─── PHASE 9: SYNAPSE — resolve brains, send email, commit ──────────
      - name: "⚡ Phase 9 — SYNAPSE (resolver + daily email)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 mycelium/SYNAPSE.py || echo "SYNAPSE error"
        continue-on-error: true

      # ─── FINAL: Commit everything ─────────────────────────────────────────
      - name: "💾 Final — Commit cycle outputs"
        run: |
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "🧠 omnibrain cycle $(date +%Y-%m-%dT%H:%M) — loop running"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main 2>/dev/null || git push origin main --force-with-lease
        continue-on-error: true
