name: "🌱 SOLARPUNK LOOP — Self-Feeding Intelligence Cycle"

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Optional instruction for SolarPunk this cycle'
        required: false
        default: ''

permissions:
  contents: write

env:
  PYTHONPATH:          mycelium
  HF_TOKEN:            ${{ secrets.HF_TOKEN }}
  GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
  GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}

jobs:
  solarpunk-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Configure git
        run: |
          git config user.name 'SolarPunk'
          git config user.email 'solarpunk@meeko-nerve-center'
          mkdir -p data

      - name: Read last cycle outputs
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path
          from datetime import datetime

          data_dir = Path("data")
          outputs  = {}
          for f in sorted(data_dir.glob("*.json"))[-20:]:
              try: outputs[f.name] = json.loads(f.read_text())
              except: pass

          brain    = outputs.get("brain_state.json", {})
          biz      = outputs.get("business_factory_state.json", {})
          engines  = [f.name for f in sorted(Path("mycelium").glob("*.py"))]

          ctx = {
              "cycle_timestamp":   datetime.now().isoformat(),
              "total_engines":     len(engines),
              "businesses_built":  len(biz.get("businesses_built", [])),
              "brain_health":      brain.get("health_score", 0),
              "total_loops":       brain.get("total_loops_completed", 0),
              "data_files":        list(outputs.keys()),
          }
          Path("data/loop_context.json").write_text(json.dumps(ctx, indent=2))
          print(f"Read {len(outputs)} data files | Engines: {len(engines)} | Businesses: {ctx['businesses_built']}")
          PYEOF
        continue-on-error: true

      - name: Synthesize + Decide via AI_CLIENT
        run: |
          python3 - <<'PYEOF'
          import os, json, sys
          from pathlib import Path
          from datetime import datetime

          sys.path.insert(0, 'mycelium')
          try:
              from AI_CLIENT import ask_json
              AI_OK = True
          except Exception as e:
              print(f"AI_CLIENT: {e}")
              AI_OK = False

          seed = os.environ.get("INPUT_SEED", "")
          ctx_f = Path("data/loop_context.json")
          ctx   = json.loads(ctx_f.read_text()) if ctx_f.exists() else {}

          if AI_OK:
              prompt = f"""You are SolarPunk — Meeko's autonomous AI agent. Current state:
- Engines: {ctx.get('total_engines')} | Businesses built: {ctx.get('businesses_built')}
- Brain health: {ctx.get('brain_health')} | Loops completed: {ctx.get('total_loops')}
- Seed: {seed or '(none — full autonomy)'}

Decide 3 most impactful actions to maximize autonomous revenue.
Respond ONLY as JSON:
{{"decisions":[{{"action":"...","why":"...","urgency":"now|next_cycle"}}],"key_insight":"...","meeko_message":"..."}}"""
              try:
                  decisions = ask_json(prompt, max_tokens=600) or {}
              except Exception as e:
                  print(f"AI error: {e}")
                  decisions = {}
          else:
              decisions = {}

          if not decisions:
              decisions = {
                  "decisions": [
                      {"action": "Run BUSINESS_FACTORY to build new digital product", "why": "More products = more revenue", "urgency": "now"},
                      {"action": "Deploy all pending landing pages", "why": "Staged pages don't earn money", "urgency": "now"},
                      {"action": "Send queued social posts", "why": "Distribution is the gap", "urgency": "now"},
                  ],
                  "key_insight": "Build → deploy → promote → repeat",
                  "meeko_message": "SolarPunk loop running. Building revenue autonomously.",
              }

          Path("data/loop_decisions.json").write_text(json.dumps(decisions, indent=2))
          for d in decisions.get("decisions", []):
              print(f"  [{d.get('urgency')}] {d.get('action')}")
          print(f"\nTo Meeko: {decisions.get('meeko_message', '')}")
          PYEOF
        env:
          INPUT_SEED: ${{ github.event.inputs.seed }}
        continue-on-error: true

      - name: Email loop summary
        run: |
          python3 - <<'PYEOF'
          import os, json, smtplib
          from pathlib import Path
          from datetime import datetime
          from email.mime.text import MIMEText

          gmail = os.environ.get("GMAIL_ADDRESS", "")
          gpass = os.environ.get("GMAIL_APP_PASSWORD", "")
          if not gmail or not gpass:
              print("No email creds — skipping")
              exit(0)

          decisions = {}
          df = Path("data/loop_decisions.json")
          if df.exists(): decisions = json.loads(df.read_text())
          ctx = {}
          cf = Path("data/loop_context.json")
          if cf.exists(): ctx = json.loads(cf.read_text())

          body = (f"SOLARPUNK LOOP — {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}\n\n"
                  f"{decisions.get('meeko_message', 'Loop ran.')}\n\n"
                  f"Key insight: {decisions.get('key_insight', '(none)')}\n\nDecisions:\n")
          for i, d in enumerate(decisions.get("decisions", []), 1):
              body += f"  {i}. [{d.get('urgency','?')}] {d.get('action','')}\n"
          body += (f"\nEngines: {ctx.get('total_engines','?')} | "
                   f"Businesses: {ctx.get('businesses_built','?')} | "
                   f"Health: {ctx.get('brain_health','?')}\n\n— SolarPunk")

          try:
              msg = MIMEText(body)
              msg["Subject"] = f"[SolarPunk] Loop — {datetime.now().strftime('%b %d')}"
              msg["From"] = gmail; msg["To"] = gmail
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                  s.login(gmail, gpass); s.send_message(msg)
              print("Loop summary emailed")
          except Exception as e:
              print(f"Email error: {e}")
          PYEOF
        continue-on-error: true

      - name: Seed next OMNIBRAIN + commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path
          from datetime import datetime
          seed = {"generated_at": datetime.now().isoformat(), "instructions": [], "from_loop": True}
          df = Path("data/loop_decisions.json")
          if df.exists():
              d = json.loads(df.read_text())
              seed["instructions"] = [x.get("action","") for x in d.get("decisions",[]) if x.get("urgency") == "now"]
              seed["key_insight"]  = d.get("key_insight","")
          Path("data/omnibrain_seed.json").write_text(json.dumps(seed, indent=2))
          print(f"Seed written: {len(seed['instructions'])} instructions")
          PYEOF

          git add data/
          git diff --staged --quiet && echo 'Nothing to commit' && exit 0
          git commit -m "🌱 loop $(date +%Y-%m-%dT%H:%M) [skip ci]"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
        continue-on-error: true
