name: 🌱 SolarPunk Activate!

# THE ONE WORKFLOW.
# Click Run → everything fires across all 21 repos in sequence.
# Phase 0: silence all failure emails first.
# Critical workflows wait for completion before proceeding.
# Failures auto-retry once. Everything gets logged.
# Live dashboard: https://meekotharaccoon-cell.github.io/meeko-nerve-center/activate_dashboard.html

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you activating? (optional)'
        required: false
        default: 'Full system activation'
  schedule:
    - cron: '0 6 * * *'

jobs:
  activate:
    name: 🌱 Activate All Systems
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true   # never sends failure email

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Phase 0 — Silence all failure emails across all repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python mycelium/silence_failures.py
        continue-on-error: true

      - name: 🌱 SolarPunk Activate!
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python mycelium/activate.py
        continue-on-error: true

      - name: Upload activation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solarpunk-activate-${{ github.run_id }}
          path: |
            data/activate_status.json
            activate_dashboard.html
          if-no-files-found: ignore

      - name: Print dashboard URL
        if: always()
        run: |
          echo "🌱 Live Dashboard:"
          echo "https://meekotharaccoon-cell.github.io/meeko-nerve-center/activate_dashboard.html"
